services:
  # MySQL Database
  database:
    image: mysql:8.0
    container_name: zoo_database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zoo_app
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zoo_network

  # Backend (Symfony API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zoo_backend
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://app:app123@database:3306/zoo_app?serverVersion=8.0&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      JWT_PASSPHRASE: 6ef5d0ad8e0a098d4413a50a33f446fc8e8ed53e2f2a0c9f1d619fd9dcbec0c0
      MAILER_DSN: smtp://mailer:1025
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_var:/var/www/html/var
      - backend_bundles:/var/www/html/public/bundles
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    networks:
      - zoo_network
    command: >
      sh -c "
        composer install --no-interaction &&
        rm -rf public/bundles/* &&
        php bin/console assets:install --symlink --relative public &&
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration &&
        php -S 0.0.0.0:8000 -t public
      "

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zoo_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - zoo_network
    command: npm run dev -- --host 0.0.0.0

  # Mailer (Mailpit for development)
  mailer:
    image: axllent/mailpit
    container_name: zoo_mailer
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - zoo_network

volumes:
  database_data:
  backend_vendor:
  backend_var:
  backend_bundles:
  frontend_node_modules:

networks:
  zoo_network:
    driver: bridge
